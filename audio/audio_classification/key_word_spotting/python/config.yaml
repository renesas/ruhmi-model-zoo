# =============================================================================# ─────────────────────────────────────────────────────────────────────────────

# MCU Compile Configuration — KWS DS-CNN (Audio Classification)# KWS DS-CNN — RUHMI Compilation Configuration

# Usage (from repo root): python ruhmi_tools/mcu_compile.py audio/audio_classification/key_word_spotting/python/config.yaml# ─────────────────────────────────────────────────────────────────────────────

# =============================================================================# Update model_path and output_dir to absolute paths on your system.



# ---------------------------------------------------------------------------model_path: /path/to/audio/audio_classification/key_word_spotting/python/model/kws_ref_model_INT8.tflite

# Required: Model input and output pathsoutput_dir: /path/to/audio/audio_classification/key_word_spotting/embedded_c/src_mcu

# ---------------------------------------------------------------------------

model_path: audio/audio_classification/key_word_spotting/python/model/kws_ref_model_INT8.tflite   # Path to model file (.tflite)# Target: 'cpu' → CMSIS-NN (Cortex-M85)  |  'npu' → Ethos-U55 NPU

output_dir: audio/audio_classification/key_word_spotting/embedded_c/src_mcu                       # Output directory for compiled C-codetarget: cpu



# ---------------------------------------------------------------------------# Quantize: set false since the INT8 model is already quantized

# Required: Target platform — must be exactly 'cpu' or 'npu'quantize: false

# ---------------------------------------------------------------------------

target: cpu        # 'cpu' → CMSIS-NN | 'npu' → Ethos-U55 (requires INT8)# Model metadata

model_name: kws_ds_cnn

# ---------------------------------------------------------------------------task: audio_classification

# Quantizationinput_shape: [1, 49, 10, 1]

# ---------------------------------------------------------------------------output_shape: [1, 12]

quantize: false    # Model is already INT8 — no further quantization needed

# ---------------------------------------------------------------------------
# External memory
# ---------------------------------------------------------------------------
external: false            # Set true to force external memory mode (enables Vela OSPI for NPU)
memory_threshold: 0.8      # Model size threshold in MB for auto-detecting external memory need

# ---------------------------------------------------------------------------
# Calibration data (used when quantize: true)
# ---------------------------------------------------------------------------
calib_data: ''   # Path to calibration data (.npy file or directory). Leave empty for random data.
calib_num: 5     # Number of calibration samples

# ---------------------------------------------------------------------------
# MERA / Vela configuration
# ---------------------------------------------------------------------------
memory_mode: Sram_Only    # 'Sram_Only' or 'Shared_Sram'
optimization: Performance # 'Performance' or 'Size'
weight_loc: Flash         # 'Flash' or 'Iram'
suffix: ''                # Optional suffix appended to generated source file names

# ---------------------------------------------------------------------------
# ONNX options
# ---------------------------------------------------------------------------
onnx_dims: ''   # Freeze symbolic ONNX dimensions, e.g. 'batch=1,width=224,height=224'

# ---------------------------------------------------------------------------
# Evaluation options
# ---------------------------------------------------------------------------
ref_data: false        # Generate reference I/O data for testing
x86: false             # Generate x86 pybind11 bindings for manual host testing
host_evaluate: false   # Build and run on host to validate outputs (CPU only, implies x86)

# ---------------------------------------------------------------------------
# Output options
# ---------------------------------------------------------------------------
result: ''     # Path for JUnit XML output (leave empty to skip)
verbose: false # Print detailed output
